spring.application.name=plataformaEducativa
server.port=8080

# Spring Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/e6e26a6c-d0c6-4e49-91fe-738e46418f87/v2.0
# S3 y efs
s3.bucket=bucket-desarrollo-cloud
efs.path=/app/efs

# Configuracion Oracle Cloud
spring.datasource.url=jdbc:oracle:thin:@sl48gy9yyye6vjcb_tp?TNS_ADMIN=/opt/oracle/wallet
spring.datasource.username=${DB_USERNAME:ADMIN}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}

